<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 簡易 M3U 播放器</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #252525; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #sidebar h2 { padding: 15px; margin: 0; background: #333; font-size: 1.2rem; }
        #playlist { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        #playlist li { padding: 12px 15px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.2s; }
        #playlist li:hover { background: #3d3d3d; }
        #playlist li.active { background: #007bff; }
        
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        video { width: 90%; max-height: 80vh; outline: none; background: #000; }
        .controls { padding: 20px; width: 90%; }
        input[type="text"] { width: 70%; padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>頻道列表</h2>
    <div style="padding: 10px;">
        <input type="text" id="m3uUrl" placeholder="輸入 M3U 網址...">
        <button onclick="loadM3uFromUrl()">載入</button>
    </div>
    <ul id="playlist">
        </ul>
</div>

<div id="main">
    <video id="video" controls></video>
    <div class="controls">
        <h3 id="currentChannel">請選擇頻道</h3>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const playlistElement = document.getElementById('playlist');
    const currentTitle = document.getElementById('currentChannel');
    let hls = new Hls();

    // 播放指定 URL
    function playM3u8(url, title) {
        currentTitle.innerText = "正在播放: " + title;
        
        if (Hls.isSupported()) {
            hls.destroy(); // 銷毀舊實例
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // 針對 Safari 原生支援
            video.src = url;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }

    // 解析 M3U 內容
    function parseM3U(data) {
        const lines = data.split('\n');
        const channels = [];
        let currentItem = {};

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                // 取得頻道名稱 (取逗號後的內容)
                const title = line.split(',')[1] || "未知頻道";
                currentItem.title = title;
            } else if (line.startsWith('http')) {
                // 取得頻道 URL
                currentItem.url = line;
                channels.push(currentItem);
                currentItem = {};
            }
        });

        renderPlaylist(channels);
    }

    // 渲染清單到畫面上
    function renderPlaylist(channels) {
        playlistElement.innerHTML = "";
        channels.forEach((channel, index) => {
            const li = document.createElement('li');
            li.innerText = channel.title;
            li.onclick = () => {
                // 移除其他項目的 active class
                document.querySelectorAll('#playlist li').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                playM3u8(channel.url, channel.title);
            };
            playlistElement.appendChild(li);
        });
    }

    // 從網址讀取 M3U
    async function loadM3uFromUrl() {
        const url = document.getElementById('m3uUrl').value;
        if (!url) return alert("請輸入網址");
        
        try {
            const response = await fetch(url);
            const data = await response.text();
            parseM3U(data);
        } catch (err) {
            alert("讀取失敗，請檢查 CORS 設定或網址是否正確。");
            console.error(err);
        }
    }
</script>

</body>
</html>
